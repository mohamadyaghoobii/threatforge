title: PowerShell Download Cradle
id: df-local-0002
status: test
description: Detects PowerShell command lines that download remote content and execute or stage it.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: MetaSec Security Center
date: 2026/06/09
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - \powershell.exe
      - \pwsh.exe
  selection_command:
    CommandLine|contains:
      - Invoke-WebRequest
      - iwr
      - WebClient
      - DownloadString
      - FromBase64String
  condition: selection_image and selection_command
falsepositives:
  - Automation scripts and admin tooling
level: high
