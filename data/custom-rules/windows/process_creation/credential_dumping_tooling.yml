title: Credential Dumping Tooling Indicators
id: df-local-0004
status: test
description: Detects process command-line indicators often associated with credential dumping tools and LSASS access attempts.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: MetaSec Security Center
date: 2026/06/09
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - sekurlsa
      - lsass
      - minidump
      - comsvcs.dll
      - procdump
  condition: selection
falsepositives:
  - Memory dump troubleshooting by administrators
level: critical
