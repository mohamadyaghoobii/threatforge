id: ecs_cloud_aws
target: elastic
name: Elastic ECS — AWS CloudTrail
audience: Cloud Security
description: AWS CloudTrail via Elastic AWS integration normalized to ECS.
output_formats: [kql, lucene, detection_rule_ndjson]
