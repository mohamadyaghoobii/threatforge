id: ecs_windows_sysmon
target: elastic
name: Elastic ECS — Windows Sysmon
audience: SOC / Endpoint
description: Sysmon via Winlogbeat/Elastic Agent normalized to ECS.
output_formats: [kql, lucene, eql, esql, detection_rule_ndjson]
severity_map: {critical: critical, high: high, medium: medium, low: low, informational: low}
entity_inference: {host: host.name, user: user.name, process: process.command_line}
mitre_metadata_strategy: elastic_detection_rule
