id: splunk_cim_endpoint
target: splunk
name: Splunk CIM Endpoint
audience: SOC / Detection Engineering
description: CIM-normalized endpoint telemetry (Endpoint.Processes data model).
base:
  index: "*"
  default_filter: "tag=process tag=endpoint"
field_mapping_pack: splunk_cim_endpoint
output_formats: [spl, savedsearches_conf, datamodel_tstats, risk_based_alert]
output_defaults:
  spl:
    leading_filter: "index=* tag=process tag=endpoint"
  savedsearches_conf:
    cron_schedule: "*/15 * * * *"
    earliest_time: "-15m"
    latest_time: "now"
    suppression: {enabled: true, fields: [dest, user], period: "1h"}
    notable: {enabled: true, security_domain: endpoint}
    rba: {enabled: true, risk_object_field: user, risk_object_type: user, threat_object_field: process_path, threat_object_type: process, base_score: 50}
severity_map: {critical: 5, high: 4, medium: 3, low: 2, informational: 1}
entity_inference: {host: dest, user: user, process: process_path}
mitre_metadata_strategy: ess_correlation_annotation
