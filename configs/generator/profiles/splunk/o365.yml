id: splunk_o365
target: splunk
name: Splunk Microsoft 365
audience: Identity / Email Security
description: Microsoft 365 management activity (Exchange, SharePoint, AAD) via Splunk Add-on for Microsoft Office 365.
base:
  index: o365
  sourcetype: "o365:management:activity"
field_mapping_pack: null
output_formats: [spl, savedsearches_conf]
output_defaults:
  spl:
    leading_filter: "index=o365 sourcetype=o365:management:activity"
  savedsearches_conf:
    cron_schedule: "*/15 * * * *"
    earliest_time: "-15m"
    latest_time: "now"
    suppression: {enabled: true, fields: [user], period: "1h"}
    notable: {enabled: true, security_domain: access}
severity_map: {critical: 5, high: 4, medium: 3, low: 2, informational: 1}
entity_inference: {user: user, host: ClientIP}
mitre_metadata_strategy: ess_correlation_annotation
