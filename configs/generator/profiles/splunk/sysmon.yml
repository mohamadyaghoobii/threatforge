id: splunk_sysmon
target: splunk
name: Splunk Sysmon
audience: SOC / Endpoint
description: |
  Sysmon shipped to index=sysmon as XmlWinEventLog. Suitable for Sigma rules
  with logsource.product=windows + category in {process_creation,
  network_connection, image_load, file_event, registry_event, dns_query}.
base:
  index: sysmon
  sourcetype: XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
default_event_code_by_category:
  process_creation: 1
  network_connection: 3
  image_load: 7
  file_event: 11
  registry_event: 12
  dns_query: 22
field_mapping_pack: splunk_sysmon_fields
pysigma_pipeline: pipelines/splunk_sysmon.yml
processing:
  - rewrite_event_id_to_eventcode
  - case_insensitive_strings
  - add_sysmon_sourcetype_filter
output_formats:
  - spl
  - savedsearches_conf
  - dashboard_panel
  - risk_based_alert
  - ess_notable
output_defaults:
  spl:
    leading_filter: "index=sysmon sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"
  savedsearches_conf:
    cron_schedule: "*/15 * * * *"
    earliest_time: "-15m"
    latest_time: "now"
    suppression:
      enabled: true
      fields: [host, user]
      period: "1h"
    notable:
      enabled: true
      security_domain: endpoint
    rba:
      enabled: true
      risk_object_field: user
      risk_object_type: user
      threat_object_field: Image
      threat_object_type: process
      base_score: 40
  risk_based_alert:
    cron_schedule: "*/15 * * * *"
    earliest_time: "-15m"
    rba:
      enabled: true
      risk_object_field: user
      risk_object_type: user
      threat_object_field: Image
      threat_object_type: process
      base_score: 40
  dashboard_panel:
    earliest_time: "-24h"
    latest_time: "now"
severity_map:
  critical: 5
  high: 4
  medium: 3
  low: 2
  informational: 1
entity_inference:
  host: ComputerName
  user: User
  process: Image
  parent_process: ParentImage
mitre_metadata_strategy: ess_correlation_annotation
