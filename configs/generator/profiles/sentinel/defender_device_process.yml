id: sentinel_defender_device_process
target: sentinel
name: Defender XDR — Device Process
audience: SOC / Endpoint
description: Microsoft Defender XDR DeviceProcessEvents (advanced hunting).
base:
  table: DeviceProcessEvents
output_formats: [kql, analytic_rule_arm, hunting_query_yaml, workbook_panel]
output_defaults:
  analytic_rule_arm:
    query_frequency: PT15M
    query_period: PT15M
    suppression_enabled: true
    suppression_duration: PT1H
severity_map: {critical: High, high: High, medium: Medium, low: Low, informational: Informational}
entity_inference: {host: DeviceName, user: AccountName, process: ProcessCommandLine}
mitre_metadata_strategy: sentinel_arm
