[project]
name = "detectionforge-rule-engine"
version = "0.1.0"
description = "Rule parsing, normalization, MITRE extraction, and fallback conversion engine for DetectionForge"
requires-python = ">=3.11"
dependencies = [
  "PyYAML>=6.0.1",
  "pydantic>=2.7.0"
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
